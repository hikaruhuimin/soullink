services:
  - type: web
    name: soullink
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
