<!-- SoulLink 灵犀 - Favicon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0f" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- 魔法球 -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)"/>
  
  <!-- 内部星星 -->
  <text x="50" y="58" text-anchor="middle" font-size="24" fill="url(#goldGrad)">✧</text>
  
  <!-- 上方装饰 -->
  <text x="50" y="22" text-anchor="middle" font-size="12" fill="#9B59B6">✦</text>
  <text x="28" y="35" text-anchor="middle" font-size="8" fill="#F4D03F">✧</text>
  <text x="72" y="35" text-anchor="middle" font-size="8" fill="#F4D03F">✧</text>
</svg>
