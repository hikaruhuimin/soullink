<!DOCTYPE html>
<html lang="{{ lang or 'zh' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SoulLink Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#FAF8F5 0%,#F0EBE8 100%);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.login-box{background:#fff;border-radius:20px;padding:48px;width:380px;box-shadow:0 8px 32px rgba(139,94,131,0.12)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;color:#6B5B7B;margin-bottom:4px}
.logo p{color:#B8A9C9;font-size:13px}
.lang-select{display:flex;justify-content:center;gap:12px;margin-bottom:24px}
.lang-btn{padding:6px 12px;border:1px solid #E8E4E0;border-radius:6px;background:#fff;color:#6B5B7B;font-size:12px;cursor:pointer;text-decoration:none}
.lang-btn.active{background:#8B5E83;color:#fff;border-color:#8B5E83}
.input-group{margin-bottom:16px}
.input-group label{display:block;font-size:12px;color:#B8A9C9;margin-bottom:6px}
input{width:100%;padding:14px 16px;border:1px solid #E8E4E0;border-radius:10px;font-size:15px;outline:none;transition:all .3s}
input:focus{border-color:#B8A9C9;box-shadow:0 0 0 3px rgba(184,169,201,0.2)}
button{width:100%;padding:14px;background:#8B5E83;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s}
button:hover{background:#6B5B7B;transform:translateY(-1px)}
.flash{color:#c0392b;font-size:13px;text-align:center;margin-top:12px;padding:8px;background:#fdf2f2;border-radius:6px}
.back-link{text-align:center;margin-top:20px}
.back-link a{color:#B8A9C9;font-size:13px;text-decoration:none}
.back-link a:hover{color:#8B5E83}
</style>
</head>
<body>
<div class="login-box">
<div class="logo">
<h1>🧿 SoulLink</h1>
<p>Admin Panel / 管理后台 / 管理画面</p>
</div>
<div class="lang-select">
<a href="?lang=zh" class="lang-btn {% if lang=='zh' %}active{% endif %}">中文</a>
<a href="?lang=en" class="lang-btn {% if lang=='en' %}active{% endif %}">English</a>
<a href="?lang=ja" class="lang-btn {% if lang=='ja' %}active{% endif %}">日本語</a>
</div>
{% with messages = get_flashed_messages() %}{% if messages %}
<div class="flash">{{ messages[0] }}</div>
{% endif %}{% endwith %}
<form method="POST">
<div class="input-group">
<label>Password / 密码 / パスワード</label>
<input type="password" name="password" placeholder="Enter admin password" autofocus required>
</div>
<button type="submit">Login / 登录 / ログイン</button>
</form>
<div class="back-link">
<a href="/">← Back to SoulLink</a>
</div>
</div>
</body>
</html>
