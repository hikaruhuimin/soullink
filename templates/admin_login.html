<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SoulLink Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#FAF8F5;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.login-box{background:#fff;border-radius:16px;padding:48px;width:360px;box-shadow:0 4px 24px rgba(139,94,131,0.08)}
h1{color:#6B5B7B;font-size:22px;text-align:center;margin-bottom:8px}p{color:#B8A9C9;font-size:13px;text-align:center;margin-bottom:32px}
input{width:100%;padding:12px 16px;border:1px solid #E8E4E0;border-radius:8px;font-size:15px;outline:none;transition:border .3s}
input:focus{border-color:#B8A9C9}button{width:100%;padding:12px;background:#8B5E83;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;margin-top:16px;transition:background .3s}
button:hover{background:#6B5B7B}.flash{color:#c0392b;font-size:13px;text-align:center;margin-top:12px}
</style></head>
<body>
<div class="login-box">
<h1>SoulLink Admin</h1><p>管理后台</p>
{% with messages = get_flashed_messages() %}{% if messages %}<div class="flash">{{ messages[0] }}</div>{% endif %}{% endwith %}
<form method="POST"><input type="password" name="password" placeholder="请输入管理密码" autofocus><button type="submit">登录</button></form>
</div>
</body></html>
