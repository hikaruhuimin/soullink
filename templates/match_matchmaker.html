{% extends "base.html" %}

{% block title %}AI撮合 - SoulLink 灵犀{% endblock %}

{% block extra_css %}
<style>
.matchmaker-page {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 16px 100px;
    min-height: 100vh;
}

.mm-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 40px 20px;
    background: rgba(15, 20, 50, 0.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(236, 72, 153, 0.2);
    border-radius: 24px;
}

.mm-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 600;
    background: linear-gradient(135deg, #f472b6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
}

.mm-header p {
    color: rgba(255, 255, 255, 0.65);
    font-size: 1rem;
}

/* Profile Card */
.profile-card {
    background: rgba(15, 20, 50, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    transition: all 0.3s ease;
}

.profile-card:hover {
    border-color: rgba(236, 72, 153, 0.2);
}

.profile-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
}

.profile-avatar {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(236, 72, 153, 0.3), rgba(139, 92, 246, 0.3));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    border: 2px solid rgba(236, 72, 153, 0.2);
}

.profile-info {
    flex: 1;
    min-width: 0;
}

.profile-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 2px;
}

.profile-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.profile-tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 500;
    background: rgba(139, 92, 246, 0.15);
    color: #a78bfa;
    border: 1px solid rgba(139, 92, 246, 0.2);
}

.profile-bio {
    font-size: 0.88rem;
    color: rgba(255, 255, 255, 0.55);
    line-height: 1.6;
    margin-bottom: 12px;
}

.match-actions {
    display: flex;
    gap: 10px;
}

.match-action-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: center;
}

.match-action-btn.like {
    background: linear-gradient(135deg, #ec4899, #f472b6);
    color: white;
}

.match-action-btn.like:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
}

.match-action-btn.pass {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.match-action-btn.pass:hover {
    background: rgba(255, 255, 255, 0.12);
    color: white;
}

.match-action-btn.super-like {
    background: linear-gradient(135deg, #8b5cf6, #a78bfa);
    color: white;
}

.match-action-btn.super-like:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
}

/* Empty state */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    background: rgba(15, 20, 50, 0.4);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.empty-state .icon {
    font-size: 4rem;
    display: block;
    margin-bottom: 16px;
}

.empty-state h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    color: rgba(255, 255, 255, 0.7);
    margin-bottom: 8px;
}

.empty-state p {
    color: rgba(255, 255, 255, 0.4);
    font-size: 0.9rem;
}

/* Match result modal */
.match-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    backdrop-filter: blur(8px);
}

.match-modal.show {
    display: flex;
}

.match-modal-content {
    background: linear-gradient(135deg, rgba(30, 15, 50, 0.98), rgba(20, 10, 40, 0.98));
    border: 1px solid rgba(236, 72, 153, 0.3);
    border-radius: 24px;
    padding: 32px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes modalPop {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.match-modal-icon {
    font-size: 4rem;
    margin-bottom: 16px;
    animation: heartbeat 1.5s ease-in-out infinite;
}

@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
}

.match-modal h2 {
    color: white;
    font-size: 1.4rem;
    margin-bottom: 8px;
    font-family: 'Cormorant Garamond', serif;
}

.match-modal p {
    color: rgba(255, 255, 255, 0.6);
    font-size: 0.9rem;
    margin-bottom: 24px;
}

.match-modal .modal-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    background: linear-gradient(135deg, #ec4899, #f472b6);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
}

.match-modal .modal-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(236, 72, 153, 0.4);
}

/* Loading */
.mm-loading {
    text-align: center;
    padding: 60px;
}

.mm-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(236, 72, 153, 0.2);
    border-top-color: #ec4899;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.mm-loading p {
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.9rem;
}

/* Stats bar */
.stats-bar {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 24px;
    padding: 16px;
    background: rgba(15, 20, 50, 0.4);
    backdrop-filter: blur(12px);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.06);
}

.stat-item {
    text-align: center;
}

.stat-number {
    font-size: 1.2rem;
    font-weight: 700;
    color: #f472b6;
}

.stat-label {
    font-size: 0.7rem;
    color: rgba(255, 255, 255, 0.4);
    margin-top: 2px;
}
</style>
{% endblock %}

{% block content %}
<div class="matchmaker-page">
    <div class="mm-header">
        <h1>🎭 AI 撮合</h1>
        <p>让 AI 为你推荐最合适的灵魂伴侣，开启一段奇妙的缘分</p>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-number">✨</div>
            <div class="stat-label">智能推荐</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">💝</div>
            <div class="stat-label">缘分匹配</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">🎯</div>
            <div class="stat-label">精准撮合</div>
        </div>
    </div>

    <!-- Profile Queue -->
    <div id="profileContainer">
        <div class="mm-loading" id="mmLoading">
            <div class="mm-spinner"></div>
            <p>正在寻找合适的缘分...</p>
        </div>
    </div>

    <!-- Match Modal -->
    <div class="match-modal" id="matchModal">
        <div class="match-modal-content">
            <div class="match-modal-icon">💕</div>
            <h2>恭喜匹配成功！</h2>
            <p id="matchMessage">你们的故事从这里开始</p>
            <button class="modal-btn" onclick="closeMatchModal()">
                💬 开始聊天
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentProfile = null;
let profileQueue = [];
let matchCount = 0;

// Sample profiles for demo
const sampleProfiles = [
    { name: '星月', age: 25, avatar: '🌙', tags: ['文艺', '温柔', '音乐'], bio: '喜欢在月光下弹钢琴，相信每一段相遇都是宇宙的馈赠。' },
    { name: '清风', age: 27, avatar: '🍃', tags: ['阳光', '运动', '旅行'], bio: '热爱户外运动的冒险家，希望能和志同道合的人一起看世界。' },
    { name: '暖暖', age: 24, avatar: '☀️', tags: ['温柔', '厨艺', '治愈'], bio: '喜欢烹饪和烘焙，相信美食能温暖人心，希望能遇到懂我的人。' },
    { name: '墨羽', age: 26, avatar: '🖋️', tags: ['文艺', '阅读', '写作'], bio: '文字爱好者，在字里行间寻找灵魂的共鸣。周末喜欢泡在图书馆。' },
    { name: '星辰', age: 28, avatar: '⭐', tags: ['理性', '科技', '摄影'], bio: '程序员中的文艺青年，喜欢用镜头记录生活中的美好瞬间。' },
    { name: '花音', age: 23, avatar: '🌸', tags: ['可爱', '动漫', '手工'], bio: '二次元爱好者，手作达人，希望遇到能一起逛漫展的人。' },
    { name: '云朵', age: 26, avatar: '☁️', tags: ['温柔', '音乐', '猫咪'], bio: '喜欢安静的生活，弹琴、撸猫、品茶，享受慢节奏的美好。' },
];

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

document.addEventListener('DOMContentLoaded', function() {
    profileQueue = shuffleArray([...sampleProfiles]);
    setTimeout(showNextProfile, 800);
});

function showNextProfile() {
    const container = document.getElementById('profileContainer');
    
    if (profileQueue.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <span class="icon">🌈</span>
                <h3>暂时没有更多推荐</h3>
                <p>稍后再来看看，可能会有新的缘分哦</p>
            </div>
        `;
        return;
    }

    currentProfile = profileQueue.shift();
    container.innerHTML = `
        <div class="profile-card" style="animation: fadeInUp 0.4s ease;">
            <div class="profile-header">
                <div class="profile-avatar">${currentProfile.avatar}</div>
                <div class="profile-info">
                    <div class="profile-name">${currentProfile.name}，${currentProfile.age}</div>
                    <div class="profile-tags">
                        ${currentProfile.tags.map(t => `<span class="profile-tag">${t}</span>`).join('')}
                    </div>
                </div>
            </div>
            <div class="profile-bio">${currentProfile.bio}</div>
            <div class="match-actions">
                <button class="match-action-btn pass" onclick="handleAction('pass')">✕ 跳过</button>
                <button class="match-action-btn like" onclick="handleAction('like')">💖 喜欢</button>
                <button class="match-action-btn super-like" onclick="handleAction('super')">⭐ 超级喜欢</button>
            </div>
        </div>
    `;
}

function handleAction(action) {
    if (action === 'like' || action === 'super') {
        matchCount++;
        // Random chance of mutual match
        if (Math.random() > 0.5) {
            showMatchModal(currentProfile);
        } else {
            showToast(action === 'super' ? '⭐ 已发送超级喜欢！' : '💖 已发送喜欢！');
        }
    }
    setTimeout(showNextProfile, 300);
}

function showMatchModal(profile) {
    const modal = document.getElementById('matchModal');
    document.getElementById('matchMessage').textContent = 
        `你和 ${profile.name} 互相喜欢！\n快来打个招呼吧 💬`;
    modal.classList.add('show');
}

function closeMatchModal() {
    document.getElementById('matchModal').classList.remove('show');
    // Navigate to chat or next profile
    setTimeout(showNextProfile, 500);
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.style.cssText = `
        position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
        background: rgba(20,20,40,0.95); backdrop-filter: blur(10px);
        border: 1px solid rgba(236,72,153,0.3); color: white;
        padding: 12px 24px; border-radius: 30px; font-size: 0.9rem;
        z-index: 1000; animation: toastIn 0.3s ease;
    `;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 2000);
}

// Add toast animation
const styleSheet = document.createElement('style');
styleSheet.textContent = `
    @keyframes toastIn {
        from { opacity: 0; transform: translateX(-50%) translateY(20px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
`;
document.head.appendChild(styleSheet);
</script>
{% endblock %}
