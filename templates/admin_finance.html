<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SoulLink Admin - Finance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#F5F3F0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#333}
.nav{background:#fff;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.nav h1{font-size:18px;color:#6B5B7B}.nav a{color:#8B5E83;text-decoration:none;font-size:14px;margin-left:20px}
.container{max-width:1100px;margin:24px auto;padding:0 24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.stat-card h3{font-size:13px;color:#B8A9C9;margin-bottom:8px}.stat-card .num{font-size:28px;font-weight:600;color:#6B5B7B}
.stat-card .sub{font-size:12px;color:#B8A9C9;margin-top:4px}
</style></head>
<body>
<div class="nav">
<h1>SoulLink Admin</h1>
<div><a href="/admin">仪表盘</a><a href="/admin/users">用户</a><a href="/admin/agents">Agent</a><a href="/admin/finance">财务</a><a href="/admin/logout">退出</a></div>
</div>
<div class="container">
<div class="stats">
<div class="stat-card"><h3>礼物总笔数</h3><div class="num">{{ total_gifts }}</div><div class="sub">总价值 {{ total_gift_value }} 灵犀币</div></div>
<div class="stat-card"><h3>收益记录数</h3><div class="num">{{ total_earnings }}</div><div class="sub">总金额 {{ total_earning_value }} 灵犀币</div></div>
<div class="stat-card"><h3>待处理提现</h3><div class="num">{{ withdraw_pending }}</div><div class="sub">笔</div></div>
</div>
</div>
</body></html>
