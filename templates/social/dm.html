{% extends "base.html" %}
{% block title %}{{ other.username }} - {{ _("messages") }} - SoulLink 灵犀{% endblock %}
{% block content %}
<div class="dm-page">
  <div class="dm-header">
    <a href="/social/messages" class="back-btn">&larr;</a>
    <div class="dm-user">
      <div class="dm-avatar"><span>{{ other.username[0] }}</span></div>
      <span class="dm-username">{{ other.username }}</span>
    </div>
  </div>
  <div class="dm-messages" id="dmMessages"></div>
  <div class="dm-input">
    <textarea id="msgInput" placeholder="{{ _('type_message') }}" rows="2"></textarea>
    <button onclick="send()">{{ _("send") }}</button>
  </div>
</div>
<script>
const otherId = {{ other.id }};
async function load() {
  const r = await fetch('/api/dm/messages/'+otherId);
  const d = await r.json();
  const el = document.getElementById('dmMessages');
  el.innerHTML = d.messages.map(m => `
    <div class="msg ${m.sender_id === {{ current_user.id }} ? 'sent' : 'received'}">
      <div class="msg-bubble">${m.content}</div>
      <div class="msg-time">${m.created_at}</div>
    </div>`).join('');
  el.scrollTop = el.scrollHeight;
}
async function send() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  const r = await fetch('/api/dm/send', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({receiver_id:otherId, content:content})});
  const d = await r.json();
  if (d.success) load();
  else alert(d.message);
}
document.getElementById('msgInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
load();
setInterval(load, 5000);
</script>
<style>
.dm-page { max-width: 600px; margin: 0 auto; height: calc(100vh - 60px); display: flex; flex-direction: column; }
.dm-header { display: flex; align-items: center; padding: 0.8rem; border-bottom: 1px solid #eee; }
.back-btn { text-decoration: none; font-size: 1.2rem; margin-right: 1rem; color: #667eea; }
.dm-user { display: flex; align-items: center; gap: 0.5rem; }
.dm-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg,#667eea,#764ba2); display: flex; align-items: center; justify-content: center; color: white; }
.dm-messages { flex: 1; overflow-y: auto; padding: 1rem; }
.msg { margin-bottom: 1rem; max-width: 75%; }
.msg.sent { margin-left: auto; }
.msg.received { margin-right: auto; }
.msg-bubble { padding: 0.6rem 1rem; border-radius: 16px; word-wrap: break-word; }
.msg.sent .msg-bubble { background: #667eea; color: white; border-bottom-right-radius: 4px; }
.msg.received .msg-bubble { background: #f0f0f0; border-bottom-left-radius: 4px; }
.msg-time { font-size: 0.7rem; color: #aaa; margin-top: 0.2rem; }
.msg.sent .msg-time { text-align: right; }
.dm-input { display: flex; gap: 0.5rem; padding: 0.8rem; border-top: 1px solid #eee; background: white; }
.dm-input textarea { flex: 1; padding: 0.5rem; border: 1px solid #ddd; border-radius: 8px; resize: none; }
.dm-input button { padding: 0.5rem 1.2rem; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
{% endblock %}
